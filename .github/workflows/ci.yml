name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (offline only, no API calls)
        run: python tests/test_evolver.py
      - name: Check offline mode
        run: |
          python cli.py "It is worth noting that this is a test sentence." --offline --format json > /dev/null
      - name: Check list-personas
        run: python cli.py --list-personas
